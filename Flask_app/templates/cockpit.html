<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINA // COCKPIT</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00f3ff;
            --accent-dim: rgba(0, 243, 255, 0.2);
            --alert-color: #ff003c;
            --glass-bg: rgba(0, 10, 10, 0.6);
            --border-color: rgba(0, 243, 255, 0.4);
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Typography --- */
        h1,
        h2,
        h3,
        .brand {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        /* --- Layout Structure --- */
        #top-header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15);
            position: relative;
        }

        #main-viewport {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
            border-bottom: 1px solid var(--border-color);
        }

        #bottom-console {
            height: 240px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.8);
        }

        /* --- Header Elements --- */
        .brand {
            height: 40px;
            /* Larger logo */
            width: auto;
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        .status-bar {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #333;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .led.active {
            background-color: #0f0;
            box-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
        }

        .led.disconnected {
            background-color: var(--alert-color);
            box-shadow: 0 0 10px var(--alert-color), 0 0 20px var(--alert-color);
        }

        /* --- Glass Navbar --- */
        .glass-nav {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 8px 30px;
            border-radius: 30px;
            display: flex;
            gap: 30px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1), 0 4px 20px rgba(0, 0, 0, 0.6);
            z-index: 20;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width 0.3s ease;
            box-shadow: 0 0 5px var(--accent-color);
        }

        .nav-link:hover,
        .nav-link.active {
            opacity: 1;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        /* --- Sensor Dashboard --- */
        .sensor-dashboard {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            z-index: 4;
            padding: 40px;
        }

        /* Radar Sweep (Rotating Head) */
        .radar-container {
            position: relative;
            width: 500px;
            height: 250px;
            border-bottom: 2px solid rgba(0, 243, 255, 0.5);
            overflow: hidden;
            border-radius: 250px 250px 0 0;
            background: radial-gradient(circle at bottom, rgba(0, 243, 255, 0.1), transparent 70%);
        }

        #sweep-radar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .radar-scanline {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 250px;
            height: 2px;
            background: linear-gradient(90deg, rgba(0, 243, 255, 0.8), transparent);
            transform-origin: 0% 50%;
            z-index: 2;
            box-shadow: 0 0 10px var(--accent-color);
            /* Handle smooth css transform */
        }

        .radar-overlay-text {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-color);
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 3;
            text-shadow: 0 0 5px #000;
        }

        /* Front Proximity (Fixed Sonar) */
        .proximity-container {
            width: 300px;
            text-align: center;
            z-index: 4;
        }

        .prox-label {
            font-size: 0.9rem;
            color: var(--accent-color);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .prox-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
        }

        .prox-bar-container {
            width: 100%;
            height: 10px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: inset 0 0 5px #000;
        }

        .prox-bar {
            width: 100%;
            height: 100%;
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
            transition: width 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        /* IR Array */
        .ir-array-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            z-index: 4;
        }

        .ir-sensor {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .ir-light {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .ir-sensor span {
            font-size: 0.8rem;
            color: var(--text-main);
            letter-spacing: 1px;
            font-weight: 700;
        }

        .ir-danger {
            background: #f00 !important;
            box-shadow: 0 0 15px #f00 !important;
        }

        .rec-indicator {
            position: absolute;
            top: 30px;
            right: 40px;
            color: var(--alert-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: blink 2s infinite;
        }

        .rec-dot {
            width: 12px;
            height: 12px;
            background-color: var(--alert-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--alert-color);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            pointer-events: none;
            z-index: 3;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .crosshair::before {
            top: 39px;
            left: 0;
            width: 80px;
            height: 2px;
        }

        .crosshair::after {
            top: 0;
            left: 39px;
            width: 2px;
            height: 80px;
        }

        /* --- Console Zones --- */
        .console-zone {
            border: 1px solid var(--border-color);
            background: var(--glass-bg);
            position: relative;
            padding: 15px;
            min-height: 0;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.05);
            /* Tech Corners */
            clip-path: polygon(0 0,
                    100% 0,
                    100% calc(100% - 15px),
                    calc(100% - 15px) 100%,
                    0 100%);
        }

        .console-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 15px;
            height: 15px;
            border-top: 2px solid var(--accent-color);
            border-left: 2px solid var(--accent-color);
        }

        .zone-label {
            position: absolute;
            top: -10px;
            right: 15px;
            background: #000;
            border: 1px solid var(--border-color);
            padding: 2px 10px;
            font-size: 0.75rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* Left Zone: Joystick */
        #joystick-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Center Zone: Mission Control */
        #center-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mode-toggles {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .mode-btn:hover::before {
            left: 100%;
        }

        .mode-btn:hover {
            background: var(--accent-dim);
            box-shadow: 0 0 15px var(--accent-dim);
            text-shadow: 0 0 5px var(--accent-color);
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px var(--accent-color);
            border-color: var(--accent-color);
            font-weight: 700;
        }

        #log-box {
            flex: 1;
            min-height: 0; /* Important to prevent flex container from expanding */
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #0f0;
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
            padding-bottom: 3px;
        }

        .log-time {
            color: #005500;
            margin-right: 8px;
        }

        /* Right Zone: Calibration */
        #right-zone {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-group label {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #111;
            border: 1px solid #333;
            box-shadow: inset 0 0 5px #000;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 12px;
            border-radius: 1px;
            background: var(--accent-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
            box-shadow: 0 0 10px var(--accent-color);
            border: 1px solid #fff;
        }

        /* --- Dynamic UI States --- */
        /* Default (Manual) State */
        .mode-manual #joystick-container {
            opacity: 1;
            pointer-events: auto;
        }

        .mode-manual #system-lock-overlay,
        .mode-manual #audio-visualizer,
        .mode-manual #target-acquisition {
            display: none;
        }

        /* AI Mode State */
        .mode-ai #joystick-container {
            opacity: 0.3;
            pointer-events: none;
        }

        .mode-ai #system-lock-overlay {
            display: flex;
        }

        .mode-ai #target-acquisition {
            display: block;
        }

        .mode-ai #audio-visualizer {
            display: none;
        }

        /* Voice Mode State */
        .mode-voice #joystick-container {
            display: none;
        }

        .mode-voice #audio-visualizer {
            display: flex;
        }

        .mode-voice #system-lock-overlay,
        .mode-voice #target-acquisition {
            display: none;
        }

        /* --- New UI Elements --- */
        /* System Lock Overlay */
        #system-lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        #system-lock-overlay i {
            font-size: 2rem;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        #system-lock-overlay span {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-align: center;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Audio Visualizer */
        #audio-visualizer {
            width: 100%;
            height: 100%;
            display: none;
            /* Hidden by default */
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .bar {
            width: 8px;
            background: var(--accent-color);
            animation: wave 1s ease-in-out infinite;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .bar:nth-child(1) {
            height: 20px;
            animation-delay: 0.0s;
        }

        .bar:nth-child(2) {
            height: 40px;
            animation-delay: 0.1s;
        }

        .bar:nth-child(3) {
            height: 60px;
            animation-delay: 0.2s;
        }

        .bar:nth-child(4) {
            height: 80px;
            animation-delay: 0.3s;
        }

        .bar:nth-child(5) {
            height: 60px;
            animation-delay: 0.4s;
        }

        .bar:nth-child(6) {
            height: 40px;
            animation-delay: 0.5s;
        }

        .bar:nth-child(7) {
            height: 20px;
            animation-delay: 0.6s;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(1.5);
            }
        }

        /* Target Acquisition Overlay */
        #target-acquisition {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 2px solid #0f0;
            display: none;
            /* Hidden by default */
            z-index: 5;
            box-shadow: 0 0 10px #0f0, inset 0 0 10px #0f0;
            animation: target-pulse 2s infinite;
        }

        #target-acquisition::before {
            content: 'TARGET ACQUIRED';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 5px;
        }

        @keyframes target-pulse {
            0% {
                opacity: 0.8;
                border-color: #0f0;
            }

            50% {
                opacity: 1;
                border-color: #fff;
            }

            100% {
                opacity: 0.8;
                border-color: #0f0;
            }
        }

        /* --- D-Pad Drive Controls --- */
        .dpad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
        }

        .dpad-middle {
            display: flex;
            gap: 10px;
        }

        .dpad-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ccc;
            border: 2px solid #ccc;
            color: #333;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .dpad-btn:active {
            transform: scale(0.9);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .dpad-btn.up {
            background: #ffae00;
            border-color: #ffae00;
            color: #000;
        }

        .dpad-btn.stop {
            background: #ff003c;
            border-color: #ff003c;
            color: #fff;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
        }

        /* --- Preset Buttons --- */
        .preset-buttons {
            display: flex;
            gap: 5px;
            justify-content: space-between;
        }

        .preset-btn {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            #bottom-console {
                grid-template-columns: 1fr;
                height: 300px;
                padding: 10px;
            }

            #center-zone,
            #right-zone {
                display: none;
            }

            #top-header {
                padding: 0 15px;
            }

            .glass-nav {
                display: none;
                /* Hide navbar on small screens */
            }
        }

        /* --- Sonar Radar --- */
        #sonar-radar {
            width: 100%;
            height: 100%;
            display: none;
            /* Hidden by default, shown in AI/Manual if needed or specific mode */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .radar-arc {
            width: 150px;
            height: 75px;
            /* Half height for semi-circle */
            border-top-left-radius: 150px;
            border-top-right-radius: 150px;
            border: 4px solid rgba(0, 243, 255, 0.2);
            border-bottom: 0;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .radar-arc::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            border-top-left-radius: 150px;
            border-top-right-radius: 150px;
            background: radial-gradient(circle at bottom, transparent 30%, var(--accent-color) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .radar-value {
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-color);
            text-shadow: 0 0 5px var(--accent-color);
        }

        /* Safe State (>50cm) */
        .radar-arc.status-safe {
            border-color: #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .radar-arc.status-safe::after {
            background: radial-gradient(circle at bottom, transparent 30%, rgba(0, 255, 0, 0.4) 100%);
            opacity: 0.5;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                opacity: 0.3;
                transform: translateX(-50%) scale(0.9);
            }

            50% {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }

            100% {
                opacity: 0.3;
                transform: translateX(-50%) scale(0.9);
            }
        }

        /* Danger State (<20cm) */
        .radar-arc.status-danger {
            border-color: #f00;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        .radar-arc.status-danger::after {
            background: radial-gradient(circle at bottom, transparent 30%, rgba(255, 0, 0, 0.6) 100%);
            opacity: 0.8;
            animation: flash-red 0.2s infinite alternate;
        }

        @keyframes flash-red {
            0% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="mode-manual">

    <!-- Top Header -->
    <header id="top-header">
        <img src="{{ url_for('static', filename='images/lina_logo.svg') }}" alt="LINA Logo" class="brand">

        <nav class="glass-nav">
            <a href="#" class="nav-link active">HOME</a>
            <a href="#" class="nav-link">SETTINGS</a>
            <a href="#" class="nav-link">LOG</a>
            <a href="#" class="nav-link">ABOUT</a>
        </nav>

        <div class="status-bar">
            <div class="indicator">
                <div id="led-ws" class="led disconnected"></div>
                <span>WS</span>
            </div>
            <div class="indicator">
                <div id="led-esp" class="led disconnected"></div>
                <span>ESP32</span>
            </div>
            <div class="indicator">
                <span id="battery-val" style="color: var(--accent-color);">7.4V</span>
            </div>
        </div>
    </header>

    <!-- Main Viewport (Sensor Dashboard) -->
    <main id="main-viewport">
        
        <div class="sensor-dashboard">
            <!-- Top: Rotating Radar (Head Sonar) -->
            <div class="radar-container">
                <canvas id="sweep-radar" width="500" height="250"></canvas>
                <div class="radar-scanline" id="radar-scanline"></div>
                <div class="radar-overlay-text" id="radar-text">SCANNING...</div>
            </div>

            <!-- Middle: Front Proximity (Fixed Sonar) -->
            <div class="proximity-container">
                <div class="prox-label">FRONT PROXIMITY</div>
                <div class="prox-value" id="front-sonar-val">-- CM</div>
                <div class="prox-bar-container">
                    <div class="prox-bar" id="front-sonar-bar"></div>
                </div>
            </div>

            <!-- Bottom: IR Sensor Array -->
            <div class="ir-array-container">
                <div class="ir-sensor" id="ir-left">
                    <div class="ir-light"></div>
                    <span>L-IR</span>
                </div>
                <div class="ir-sensor" id="ir-center">
                    <div class="ir-light"></div>
                    <span>C-IR</span>
                </div>
                <div class="ir-sensor" id="ir-right">
                    <div class="ir-light"></div>
                    <span>R-IR</span>
                </div>
            </div>
        </div>

        <!-- Target Acquisition Overlay (Kept for AI modes) -->
        <div id="target-acquisition"></div>
    </main>

    <!-- Bottom Control Deck -->
    <footer id="bottom-console">
        <!-- Left: Joystick -->
        <div class="console-zone" id="left-zone">
            <span class="zone-label">DRIVE</span>
            <div id="joystick-container" style="display: none;"></div> <!-- Hidden for backward compatibility if needed -->
            <div class="dpad-container" id="dpad-container">
                <button class="dpad-btn up" onclick="socket.emit('control_input', {type: 'dpad', dir: 'forward'})">
                    <i class="fas fa-chevron-up"></i>
                </button>
                <div class="dpad-middle row">
                    <button class="dpad-btn left" onclick="socket.emit('control_input', {type: 'dpad', dir: 'left'})">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button class="dpad-btn stop" onclick="socket.emit('control_input', {type: 'dpad', dir: 'stop'})">
                        <i class="fas fa-stop"></i>
                    </button>
                    <button class="dpad-btn right" onclick="socket.emit('control_input', {type: 'dpad', dir: 'right'})">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <button class="dpad-btn down" onclick="socket.emit('control_input', {type: 'dpad', dir: 'backward'})">
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>

            <!-- System Lock Overlay -->
            <div id="system-lock-overlay">
                <i class="fas fa-lock"></i>
                <span>AI CONTROL ACTIVE</span>
            </div>

            <!-- Audio Visualizer -->
            <div id="audio-visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <!-- Sonar Radar -->
            <div id="sonar-radar">
                <div class="radar-arc" id="radar-arc"></div>
                <div class="radar-value" id="radar-value">-- cm</div>
            </div>
        </div>

        <!-- Center: Mission Control -->
        <div class="console-zone" id="center-zone">
            <span class="zone-label">MISSION CONTROL</span>
            <div class="mode-toggles">
                <button class="mode-btn active" onclick="setMode('MANUAL', this)">MANUAL</button>
                <button class="mode-btn" onclick="setMode('AI_FOLLOW', this)">AI FOLLOW</button>
                <button class="mode-btn" onclick="setMode('VOICE', this)">VOICE</button>
            </div>
            <div id="log-box">
                <div class="log-entry">> SYSTEM READY...</div>
            </div>
        </div>

        <!-- Right: Calibration -->
        <div class="console-zone" id="right-zone">
            <span class="zone-label">CALIBRATION</span>
            <div class="slider-group">
                <label>HEAD PAN</label>
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="updateSlider('pan', 0)">0°</button>
                    <button class="preset-btn" onclick="updateSlider('pan', 45)">45°</button>
                    <button class="preset-btn" onclick="updateSlider('pan', 90)">90°</button>
                    <button class="preset-btn" onclick="updateSlider('pan', 135)">135°</button>
                    <button class="preset-btn" onclick="updateSlider('pan', 180)">180°</button>
                </div>
            </div>
            <div class="dpad-container head-dpad" style="flex-direction: row; gap: 20px; justify-content: center; margin-top: 15px;">
                <button class="dpad-btn left" onmousedown="startHeadPan(-10)" onmouseup="stopHeadPan()" onmouseleave="stopHeadPan()" ontouchstart="startHeadPan(-10)" ontouchend="stopHeadPan()">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="dpad-btn right" onmousedown="startHeadPan(10)" onmouseup="stopHeadPan()" onmouseleave="stopHeadPan()" ontouchstart="startHeadPan(10)" ontouchend="stopHeadPan()">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        // --- Logging Utility ---
        const logBox = document.getElementById('log-box');

        function log(msg) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${timeStr}]</span> ${msg}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight; // Auto-scroll
        }

        // --- Socket.IO Initialization ---
        // Note: Assuming the server is running on the same host/port.
        // If not, specify URL e.g., io('http://localhost:5000')
        const socket = io();

        const ledWs = document.getElementById('led-ws');

        socket.on('connect', () => {
            ledWs.classList.remove('disconnected');
            ledWs.classList.add('active');
        });

        socket.on('disconnect', () => {
            log('WebSocket Disconnected.');
            ledWs.classList.remove('active');
            ledWs.classList.add('disconnected');
        });

        socket.on('log_message', (data) => {
            log(data.msg || data.data || JSON.stringify(data));
        });

        socket.on('mode_update', (data) => {
            const mode = data.mode;

            // Update Buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.trim() === mode.replace('_', ' ')) {
                    btn.classList.add('active');
                }
            });

            // Update Body Class
            document.body.classList.remove('mode-manual', 'mode-ai', 'mode-voice');
            if (mode === 'MANUAL') {
                document.body.classList.add('mode-manual');
            } else if (mode === 'AI_FOLLOW') {
                document.body.classList.add('mode-ai');
            } else if (mode === 'VOICE') {
                document.body.classList.add('mode-voice');
            }

            updateVisibility();
        });

        function updateVisibility() {
            const isVoice = document.body.classList.contains('mode-voice');
            const isAi = document.body.classList.contains('mode-ai');
            const isManual = document.body.classList.contains('mode-manual');

            const radar = document.getElementById('sonar-radar');
            const dpad = document.getElementById('dpad-container');
            const visualizer = document.getElementById('audio-visualizer');

            // Default visibility
            radar.style.display = 'none';

            if (isManual) {
                dpad.style.display = 'flex'; // D-pad uses flex column
                radar.style.display = 'none';
                visualizer.style.display = 'none';
            } else if (isAi) {
                dpad.style.display = 'none';
                radar.style.display = 'flex';
                visualizer.style.display = 'none';
            } else if (isVoice) {
                dpad.style.display = 'none';
                radar.style.display = 'none';
                visualizer.style.display = 'flex';
            }
        }

        // --- UI Controls ---
        function setMode(mode, btnElement) {
            // Send request to server
            socket.emit('set_mode', mode);
        }

        function updateSlider(type, value) {
            socket.emit('control_input', { type: 'slider', name: type, value: value });
        }

        // --- Head Control Buttons ---
        let currentHeadAngle = 90; // default, will be updated from telemetry
        socket.on('telemetry_update', (data) => {
            if (data.head_angle !== undefined) {
                currentHeadAngle = Math.round(data.head_angle);
            }
        });

        let panInterval = null;

        function adjustHead(delta) {
            const newAngle = Math.max(0, Math.min(180, currentHeadAngle + delta));
            if (newAngle !== currentHeadAngle) {
                currentHeadAngle = newAngle;
                updateSlider('pan', newAngle);
            }
        }

        function startHeadPan(delta) {
            if (panInterval) return;
            adjustHead(delta); // initial adjust
            panInterval = setInterval(() => {
                adjustHead(delta);
            }, 100);
        }

        function stopHeadPan() {
            if (panInterval) {
                clearInterval(panInterval);
                panInterval = null;
            }
        }

        // --- Sonar Logic ---
        function updateSonar(distance) {
            const arc = document.getElementById('radar-arc');
            const val = document.getElementById('radar-value');

            val.innerText = distance + ' cm';

            // Reset classes
            arc.classList.remove('status-safe', 'status-danger');

            if (distance > 50) {
                arc.classList.add('status-safe');
            } else if (distance < 20) {
                arc.classList.add('status-danger');
            }

            // Simulate sending data to server if needed, or just local viz
            // socket.emit('sonar_data', { distance: distance });
        }

        // Initialize visibility
        updateVisibility();

        // --- Mock Sensor UI Logic (Frontend Simulation) ---
        const sweepCanvas = document.getElementById('sweep-radar');
        const sweepCtx = sweepCanvas ? sweepCanvas.getContext('2d') : null;
        const scanline = document.getElementById('radar-scanline');
        
        let radarAngle = 0;
        let radarDirection = 1; 
        const radarData = new Array(180).fill(250); 

        function drawRadarGrid() {
            if(!sweepCtx) return;
            sweepCtx.clearRect(0, 0, 500, 250);
            
            sweepCtx.strokeStyle = 'rgba(0, 243, 255, 0.2)';
            for(let r = 50; r <= 250; r += 50) {
                sweepCtx.beginPath();
                sweepCtx.arc(250, 250, r, Math.PI, 0);
                sweepCtx.stroke();
            }
            for(let a = 0; a <= 180; a += 30) {
                const rad = a * Math.PI / 180;
                sweepCtx.beginPath();
                sweepCtx.moveTo(250, 250);
                sweepCtx.lineTo(250 - Math.cos(rad)*250, 250 - Math.sin(rad)*250);
                sweepCtx.stroke();
            }

            sweepCtx.lineWidth = 2;
            for(let a = 0; a < 180; a++) {
                const dist = radarData[a];
                if(dist < 250) {
                    const rad = a * Math.PI / 180;
                    const x = 250 - Math.cos(rad) * dist;
                    const y = 250 - Math.sin(rad) * dist;
                    
                    if(dist < 100) {
                        sweepCtx.fillStyle = '#ff003c';
                    } else if(dist < 180) {
                        sweepCtx.fillStyle = '#ffae00';
                    } else {
                        sweepCtx.fillStyle = '#0f0';
                    }
                    
                    sweepCtx.beginPath();
                    sweepCtx.arc(x, y, 3, 0, 2 * Math.PI);
                    sweepCtx.fill();
                }
            }
        }
        
        // ─────────────────────────────────────────────────────────────
        //  RADAR STATE
        //  The radar canvas is driven by server telemetry data.
        //  When the server sends head_angle + head_dist, we update
        //  the radarData array at that angle index and redraw.
        // ─────────────────────────────────────────────────────────────
        const MAX_RADAR_CM = 250; // cm represented by the full canvas radius

        // ── Live telemetry handler ────────────────────────────────────
        // Receives structured sensor data from the Flask server every ~50ms
        socket.on('telemetry_update', (data) => {

            // ── 1. Update radar sweep from head sonar ─────────────────
            const angle    = Math.round(data.head_angle);  // 0–180
            const distCm   = data.head_dist;               // cm

            // Map real distance to canvas pixels (MAX_RADAR_CM cm = 250 px)
            const distPx   = Math.min(MAX_RADAR_CM, (distCm / MAX_RADAR_CM) * MAX_RADAR_CM);
            radarData[angle] = distPx;

            // Fade neighbour slots slightly for a trail effect
            if (angle > 0)   radarData[angle - 1] = Math.min(MAX_RADAR_CM, radarData[angle - 1] + 20);
            if (angle < 179) radarData[angle + 1] = Math.min(MAX_RADAR_CM, radarData[angle + 1] + 20);

            // Move the CSS scanline to match the real head angle
            if (scanline) {
                const cssRot = 180 - angle;
                scanline.style.transform = `rotate(${cssRot}deg)`;
            }
            drawRadarGrid();

            // ── 2. Update front proximity readout ─────────────────────
            const frontDist = data.front_dist;
            const proxVal   = document.getElementById('front-sonar-val');
            const proxBar   = document.getElementById('front-sonar-bar');

            if (proxVal && proxBar) {
                proxVal.innerText = frontDist.toFixed(1) + ' CM';
                // Bar width: 100cm = 100%, capped at 100%
                const pct = Math.min(100, Math.max(0, frontDist));
                proxBar.style.width = pct + '%';

                if (frontDist < 20) {
                    proxBar.style.backgroundColor = '#f00';
                    proxBar.style.boxShadow       = '0 0 10px #f00';
                    proxVal.style.color            = '#f00';
                    proxVal.style.textShadow       = '0 0 10px #f00';
                } else if (frontDist < 50) {
                    proxBar.style.backgroundColor = '#ffae00';
                    proxBar.style.boxShadow       = '0 0 10px #ffae00';
                    proxVal.style.color            = '#fff';
                    proxVal.style.textShadow       = '0 0 10px #ffae00';
                } else {
                    proxBar.style.backgroundColor = '#0f0';
                    proxBar.style.boxShadow       = '0 0 10px #0f0';
                    proxVal.style.color            = '#fff';
                    proxVal.style.textShadow       = '0 0 10px #0f0';
                }
            }

            // ── 3. Update IR sensors ──────────────────────────────────
            // ir.left / ir.center / ir.right: 0 = clear, 1 = obstacle
            const irMap = {
                'ir-left':   data.ir ? data.ir.left   : 0,
                'ir-center': data.ir ? data.ir.center : 0,
                'ir-right':  data.ir ? data.ir.right  : 0,
            };
            Object.entries(irMap).forEach(([id, state]) => {
                const elWrap = document.getElementById(id);
                if (elWrap) {
                    const el = elWrap.querySelector('.ir-light');
                    if (state === 1) {
                        el.classList.add('ir-danger');
                    } else {
                        el.classList.remove('ir-danger');
                    }
                }
            });

            // ── 4. Update battery indicator ───────────────────────────
            const battVal = document.getElementById('battery-val');
            if (battVal && data.battery !== undefined) {
                battVal.innerText = data.battery.toFixed(1) + 'V';
                battVal.style.color = data.battery < 6.5 ? '#f00' : 'var(--accent-color)';
            }
        });
    </script>
</body>
