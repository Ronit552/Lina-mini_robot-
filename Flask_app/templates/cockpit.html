<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINA // COCKPIT</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00f3ff;
            --accent-dim: rgba(0, 243, 255, 0.2);
            --alert-color: #ff003c;
            --glass-bg: rgba(0, 10, 10, 0.6);
            --border-color: rgba(0, 243, 255, 0.4);
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* --- Typography --- */
        h1,
        h2,
        h3,
        .brand {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        /* --- Layout Structure --- */
        #top-header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15);
            position: relative;
        }

        #main-viewport {
            flex: 1;
            min-height: 0;
            /* Critical for flex children to shrink */
            position: relative;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            /* Reduced side panel width to prevent clipping */
            gap: 10px;
            padding: 10px;
            overflow: hidden;
            background: #000;
            border-bottom: 1px solid var(--border-color);
        }

        #bottom-console {
            height: 310px;
            /* Further reduced to ensure 100vh fit */
            display: grid;
            grid-template-columns: 1.5fr 2fr 1.5fr;
            gap: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.8);
            flex-shrink: 0;
            overflow: visible;
            /* Allow child borders to be seen */
            box-sizing: border-box;
            position: relative;
        }

        /* --- Header Elements --- */
        .brand {
            height: 85px;
            /* Larger logo */
            width: auto;
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        .status-bar {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #333;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .led.active {
            background-color: #0f0;
            box-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
        }

        .led.disconnected {
            background-color: var(--alert-color);
            box-shadow: 0 0 10px var(--alert-color), 0 0 20px var(--alert-color);
        }

        /* --- Glass Navbar --- */
        .glass-nav {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 8px 30px;
            border-radius: 30px;
            display: flex;
            gap: 30px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1), 0 4px 20px rgba(0, 0, 0, 0.6);
            z-index: 20;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width 0.3s ease;
            box-shadow: 0 0 5px var(--accent-color);
        }

        .nav-link:hover,
        .nav-link.active {
            opacity: 1;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        /* --- Sensor Dashboard --- */
        .sensor-dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            flex: 1;
            min-height: 200px;
            padding: 10px;
            overflow-y: auto;
        }

        /* 3D Robot View */
        #robot-3d-view {
            width: 500px;
            height: 250px;
            border-bottom: 2px solid var(--accent-color);
            border-radius: 250px 250px 0 0;
            overflow: hidden;
            background: radial-gradient(circle at bottom, rgba(0, 243, 255, 0.1), transparent);
            position: relative;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            min-height: 250px;
            flex: 1;
        }

        #robot-3d-view canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
            position: relative;
            z-index: 2;
        }

        /* --- Holographic HUD Animations --- */
        .hologram-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid var(--accent-dim);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        .ring-1 {
            width: 300px;
            height: 300px;
            border-style: dashed;
            animation: spin 20s linear infinite;
            opacity: 0.3;
        }

        .ring-2 {
            width: 400px;
            height: 400px;
            border: 2px solid transparent;
            border-top-color: var(--accent-color);
            animation: spin 10s linear infinite reverse;
            opacity: 0.2;
        }

        .data-float {
            position: absolute;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px var(--accent-color);
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
            animation: float-up 5s linear infinite;
        }

        @keyframes spin {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes float-up {
            0% {
                transform: translateY(100px);
                opacity: 0;
            }

            20% {
                opacity: 0.4;
            }

            80% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-100px);
                opacity: 0;
            }
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 243, 255, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            opacity: 0.2;
        }

        /* Old Sensor Dashboard styles removed */

        .rec-indicator {
            position: absolute;
            top: 30px;
            right: 40px;
            color: var(--alert-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: blink 2s infinite;
        }

        .rec-dot {
            width: 12px;
            height: 12px;
            background-color: var(--alert-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--alert-color);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            pointer-events: none;
            z-index: 3;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .crosshair::before {
            top: 39px;
            left: 0;
            width: 80px;
            height: 2px;
        }

        .crosshair::after {
            top: 0;
            left: 39px;
            width: 2px;
            height: 80px;
        }

        /* --- Console Zones --- */
        .console-zone {
            background: rgba(0, 243, 255, 0.05);
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            height: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        .console-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 15px;
            height: 15px;
            border-top: 2px solid var(--accent-color);
            border-left: 2px solid var(--accent-color);
        }

        .zone-label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Left Zone: Joystick */
        #joystick-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Center Zone: Mission Control */
        #center-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
            /* Prevent child from expanding parent */
        }

        .mode-toggles {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            background: rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 6px;
            color: var(--accent-color);
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .mode-btn:hover::before {
            left: 100%;
        }

        .mode-btn:hover {
            background: rgba(0, 243, 255, 0.15);
            box-shadow: 0 0 15px var(--accent-dim), inset 0 0 10px rgba(0, 243, 255, 0.1);
            color: #fff;
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px var(--accent-color);
            border-color: var(--accent-color);
            font-weight: 700;
            transform: scale(1.02);
        }

        #log-box {
            flex: 1;
            min-height: 0;
            background: rgba(0, 10, 10, 0.85);
            border: 1.5px solid rgba(0, 243, 255, 0.4);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #00f3ff;
            overflow-y: auto;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9), 0 0 15px rgba(0, 243, 255, 0.1);
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 243, 255, 0.3) transparent;
        }

        #log-box::before {
            content: "SYSTEM TELEMETRY LOG";
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(0, 243, 255, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
            padding-bottom: 4px;
        }

        .log-entry {
            margin-bottom: 6px;
            padding-left: 10px;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        .log-entry:hover {
            background: rgba(0, 243, 255, 0.05);
            border-left-color: var(--accent-color);
        }

        .log-time {
            color: rgba(0, 243, 255, 0.4);
            font-size: 0.75rem;
            margin-right: 10px;
        }

        /* Right Zone: Calibration */
        #right-zone {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .slider-group label {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #111;
            border: 1px solid #333;
            box-shadow: inset 0 0 5px #000;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 12px;
            border-radius: 1px;
            background: var(--accent-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
            box-shadow: 0 0 10px var(--accent-color);
            border: 1px solid #fff;
        }

        /* --- Dynamic UI States --- */
        /* Default (Manual) State */
        .mode-manual #joystick-container {
            opacity: 1;
            pointer-events: auto;
        }

        .mode-manual #system-lock-overlay,
        .mode-manual #audio-visualizer,
        .mode-manual #target-acquisition {
            display: none;
        }

        /* AI Mode State */
        .mode-ai #joystick-container {
            opacity: 0.3;
            pointer-events: none;
        }

        .mode-ai #system-lock-overlay {
            display: flex;
        }

        .mode-ai #target-acquisition {
            display: block;
        }

        .mode-ai #audio-visualizer {
            display: none;
        }

        /* Voice Mode State */
        .mode-voice #joystick-container {
            display: none;
        }

        .mode-voice #audio-visualizer {
            display: flex;
        }

        .mode-voice #system-lock-overlay,
        .mode-voice #target-acquisition {
            display: none;
        }

        /* --- New UI Elements --- */
        /* System Lock Overlay */
        #system-lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        #system-lock-overlay i {
            font-size: 2rem;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        #system-lock-overlay span {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-align: center;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Audio Visualizer */
        #audio-visualizer {
            width: 100%;
            height: 100%;
            display: none;
            /* Hidden by default */
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .bar {
            width: 8px;
            background: var(--accent-color);
            animation: wave 1s ease-in-out infinite;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .bar:nth-child(1) {
            height: 20px;
            animation-delay: 0.0s;
        }

        .bar:nth-child(2) {
            height: 40px;
            animation-delay: 0.1s;
        }

        .bar:nth-child(3) {
            height: 60px;
            animation-delay: 0.2s;
        }

        .bar:nth-child(4) {
            height: 80px;
            animation-delay: 0.3s;
        }

        .bar:nth-child(5) {
            height: 60px;
            animation-delay: 0.4s;
        }

        .bar:nth-child(6) {
            height: 40px;
            animation-delay: 0.5s;
        }

        .bar:nth-child(7) {
            height: 20px;
            animation-delay: 0.6s;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(1.5);
            }
        }

        /* Target Acquisition Overlay */
        #target-acquisition {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 2px solid #0f0;
            display: none;
            /* Hidden by default */
            z-index: 5;
            box-shadow: 0 0 10px #0f0, inset 0 0 10px #0f0;
            animation: target-pulse 2s infinite;
        }

        #target-acquisition::before {
            content: 'TARGET ACQUIRED';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 5px;
        }

        @keyframes target-pulse {
            0% {
                opacity: 0.8;
                border-color: #0f0;
            }

            50% {
                opacity: 1;
                border-color: #fff;
            }

            100% {
                opacity: 0.8;
                border-color: #0f0;
            }
        }

        /* --- D-Pad Drive Controls --- */
        .dpad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
        }

        .dpad-middle {
            display: flex;
            gap: 10px;
        }

        .dpad-btn {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            background: rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(0, 243, 255, 0.3);
            color: var(--accent-color);
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .dpad-btn:hover {
            background: rgba(0, 243, 255, 0.2);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-dim), inset 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .dpad-btn:active {
            transform: scale(0.9) translateY(0);
            background: var(--accent-color);
            color: #000;
        }

        .dpad-btn.up {
            /* Inherits default style */
        }

        .dpad-btn.stop {
            background: rgba(255, 0, 60, 0.1);
            border-color: rgba(255, 0, 60, 0.5);
            color: #ff003c;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.2);
            animation: stop-pulse 2s infinite;
        }

        @keyframes stop-pulse {
            0% {
                box-shadow: 0 0 5px rgba(255, 0, 60, 0.4);
            }

            50% {
                box-shadow: 0 0 20px rgba(255, 0, 60, 0.8);
            }

            100% {
                box-shadow: 0 0 5px rgba(255, 0, 60, 0.4);
            }
        }

        .dpad-btn.stop:hover {
            background: #ff003c;
            color: #fff;
            box-shadow: 0 0 30px #ff003c;
        }

        .dpad-btn.auto-scan {
            background: rgba(0, 243, 255, 0.05);
            border-color: var(--border-color);
            color: var(--accent-color);
            transition: all 0.3s;
        }

        .dpad-btn.auto-scan.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .dpad-btn.auto-scan.active i {
            animation: spin-icon 2s linear infinite;
        }

        @keyframes spin-icon {
            100% {
                transform: rotate(360deg);
            }
        }

        /* --- Preset Buttons --- */
        .preset-buttons {
            display: flex;
            gap: 5px;
            justify-content: space-between;
        }

        .preset-btn {

    <script>
        // --- Logging Utility ---
        const logBox = document.getElementById('log-box');

        function log(msg) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${timeStr}]</span> ${msg}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight; // Auto-scroll
        }

        // --- Socket.IO Initialization ---
        // Note: Assuming the server is running on the same host/port.
        // If not, specify URL e.g., io('http://localhost:5000')
        const socket = io();

        // --- System Lock State ---
        let systemLocked = false;
        function toggleSystemLock() {
            systemLocked = !systemLocked;
            const btn = document.getElementById('lock-btn');
            const overlay = document.getElementById('system-lock-overlay');
            if (systemLocked) {
                btn.innerHTML = '<i class="fas fa-lock"></i>';
                btn.style.background = 'rgba(255, 0, 60, 0.2)';
                btn.style.color = '#ff003c';
                btn.style.borderColor = '#ff003c';
                if (overlay) overlay.style.display = 'flex';
                log('[SYSTEM] Controls LOCKED.');
                // Stop the robot if we lock it
                socket.emit('control_input', {type: 'dpad', dir: 'stop'});
            } else {
                btn.innerHTML = '<i class="fas fa-unlock"></i>';
                btn.style.background = 'rgba(0, 243, 255, 0.05)';
                btn.style.color = 'var(--accent-color)';
                btn.style.borderColor = 'rgba(0, 243, 255, 0.3)';
                if (overlay) overlay.style.display = 'none';
                log('[SYSTEM] Controls UNLOCKED.');
            }
        }

        const ledWs = document.getElementById('led-ws');

        socket.on('connect', () => {
            ledWs.classList.remove('disconnected');
            ledWs.classList.add('active');
        });

        socket.on('disconnect', () => {
            log('WebSocket Disconnected.');
            ledWs.classList.remove('active');
            ledWs.classList.add('disconnected');
        });

        socket.on('log_message', (data) => {
            log(data.msg || data.data || JSON.stringify(data));
        });

        socket.on('mode_update', (data) => {
            const mode = data.mode;

            // Update Buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.trim() === mode.replace('_', ' ')) {
                    btn.classList.add('active');
                }
            });

            // Update Body Class
            document.body.classList.remove('mode-manual', 'mode-ai', 'mode-voice');
            if (mode === 'MANUAL') {
                document.body.classList.add('mode-manual');
            } else if (mode === 'AI_FOLLOW') {
                document.body.classList.add('mode-ai');
            } else if (mode === 'VOICE') {
                document.body.classList.add('mode-voice');
            }

            updateVisibility();
        });

        function updateVisibility() {
            const isVoice = document.body.classList.contains('mode-voice');
            const isAi = document.body.classList.contains('mode-ai');
            const isManual = document.body.classList.contains('mode-manual');

            const radar = document.getElementById('sonar-radar');
            const dpad = document.getElementById('dpad-container');
            const visualizer = document.getElementById('audio-visualizer');

            // Default visibility
            if (radar) radar.style.display = 'none';

            if (isManual) {
                if (dpad) dpad.style.display = 'flex'; // D-pad uses flex column
                if (radar) radar.style.display = 'none';
                if (visualizer) visualizer.style.display = 'none';
            } else if (isAi) {
                if (dpad) dpad.style.display = 'none';
                if (radar) radar.style.display = 'flex';
                if (visualizer) visualizer.style.display = 'none';
            } else if (isVoice) {
                if (dpad) dpad.style.display = 'none';
                if (radar) radar.style.display = 'none';
                if (visualizer) visualizer.style.display = 'flex';
            }
        }

        // --- UI Controls ---
        function setMode(mode, btnElement) {
            // Send request to server
            socket.emit('set_mode', mode);
        }

        function updateSlider(type, value) {
            socket.emit('control_input', { type: 'slider', name: type, value: value });
            if (type === 'pan') {
                const degVal = document.getElementById('pan-degree-val');
                if (degVal) {
                    degVal.innerText = value + '°';
                }
            }
        }

        // --- Head Control Buttons ---
        let currentHeadAngle = 90; // default, updated from telemetry
        let esp32EverConnected = false;

        // Turn ESP32 LED green when Flask first receives a real UDP packet
        socket.on('esp32_connected', () => {
            esp32EverConnected = true;
            const ledEsp = document.getElementById('led-esp');
            ledEsp.classList.remove('disconnected');
            ledEsp.classList.add('active');
            log('[ESP32] Hardware connected — receiving real sensor data.');
        });

        let panInterval = null;

        function adjustHead(delta) {
            const newAngle = Math.max(0, Math.min(180, currentHeadAngle + delta));
            if (newAngle !== currentHeadAngle) {
                currentHeadAngle = newAngle;
                updateSlider('pan', newAngle);
            }
        }

        function startHeadPan(delta) {
            if (isAutoScanning) {
                toggleAutoScan();
            }
            if (panInterval) return;
            adjustHead(delta); // initial adjust
            panInterval = setInterval(() => {
                adjustHead(delta);
            }, 100);
        }

        function stopHeadPan() {
            if (panInterval) {
                clearInterval(panInterval);
                panInterval = null;
            }
        }

        let autoScanInterval = null;
        let autoScanDirection = 10;
        let isAutoScanning = false;

        function toggleAutoScan() {
            isAutoScanning = !isAutoScanning;
            const btn = document.getElementById('btn-auto-scan');
            if (isAutoScanning) {
                btn.classList.add('active');
                autoScanDirection = 10; // Always start scanning left-to-right
                autoScanInterval = setInterval(() => {
                    if (currentHeadAngle >= 180) autoScanDirection = -10;
                    else if (currentHeadAngle <= 0) autoScanDirection = 10;
                    adjustHead(autoScanDirection);
                }, 400);
            } else {
                btn.classList.remove('active');
                clearInterval(autoScanInterval);
                autoScanInterval = null;
            }
        }

        function updateSpeed(val) {
            // Update all speed UI elements (both side panel and anywhere else)
            const speedVals = document.querySelectorAll('#speed-val');
            speedVals.forEach(el => el.innerText = val);

            const speedSliders = document.querySelectorAll('#speed-slider');
            speedSliders.forEach(el => el.value = val);

            socket.emit('control_input', { type: 'slider', name: 'speed', value: val });
        }

        // --- Robot Chat Logic ---
        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            appendMessage('user', msg);
            socket.emit('chat_message', { msg: msg });
            input.value = '';
        }

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        socket.on('chat_response', (data) => {
            appendMessage('lina', data.msg);
        });

        // --- Right Panel Logic ---
        function toggleWakeWord(active) {
            socket.emit('toggle_wake_word', { active: active });
        }

        function triggerAutoMove() {
            const btn = document.getElementById('auto-move-btn');
            btn.classList.add('active');
            btn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i><span>Active</span>';

            socket.emit('trigger_auto_move');

            // Revert button after 5 seconds (simulating routine duration)
            setTimeout(() => {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-play"></i><span>Auto Move<br>(DEMO)</span>';
            }, 5000);
        }

        // --- Sonar Logic ---
        function updateSonar(distance) {
            const arc = document.getElementById('radar-arc');
            const val = document.getElementById('radar-value');

            val.innerText = distance + ' cm';

            // Reset classes
            arc.classList.remove('status-safe', 'status-danger');

            if (distance > 50) {
                arc.classList.add('status-safe');
            } else if (distance < 20) {
                arc.classList.add('status-danger');
            }

            // Simulate sending data to server if needed, or just local viz
            // socket.emit('sonar_data', { distance: distance });
        }

        // Initialize visibility
        updateVisibility();

        // --- 3D Robot UI Setup (Three.js) ---
        const container3D = document.getElementById('robot-3d-view');
        const scene = new THREE.Scene();
        // Dynamic aspect ratio based on container (with fallbacks to prevent NaN)
        const initW = container3D.clientWidth || 500;
        const initH = container3D.clientHeight || 250;
        const camera = new THREE.PerspectiveCamera(50, initW / initH, 0.1, 1000);
        camera.position.set(25, 20, 35);
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(initW, initH);
        renderer.setPixelRatio(window.devicePixelRatio);
        container3D.appendChild(renderer.domElement);

        // OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.1; // Don't go below ground
        controls.minDistance = 20;
        controls.maxDistance = 100;

        // Resize handler
        window.addEventListener('resize', () => {
            if (container3D.clientWidth > 0 && container3D.clientHeight > 0) {
                camera.aspect = container3D.clientWidth / container3D.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container3D.clientWidth, container3D.clientHeight);
            }
        });

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0x00f3ff, 1.2);
        dirLight.position.set(20, 30, 20);
        scene.add(dirLight);

        // Materials (Sci-Fi Theme - Adjusted for no env map)
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.3, roughness: 0.7 });
        const accentMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.4, roughness: 0.6 });
        const eyeCyanMat = new THREE.MeshStandardMaterial({ color: 0x00f3ff, emissive: 0x00f3ff, emissiveIntensity: 0.8 });
        const eyeRedMat = new THREE.MeshStandardMaterial({ color: 0xff003c, emissive: 0xff003c, emissiveIntensity: 1.2 });

        // Robot Assembly
        const robotGroup = new THREE.Group();
        scene.add(robotGroup);

        // Chassis Main
        const bodyGeo = new THREE.BoxGeometry(14, 6, 22);
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.position.y = 5;
        robotGroup.add(bodyMesh);

        // Chassis Accents
        const topPlateGeo = new THREE.BoxGeometry(10, 1, 16);
        const topPlate = new THREE.Mesh(topPlateGeo, accentMat);
        topPlate.position.y = 8.5;
        robotGroup.add(topPlate);

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(4.5, 4.5, 2.5, 32);
        wheelGeo.rotateZ(Math.PI / 2);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 });
        
        const createWheel = (x, z) => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.position.set(x, 4.5, z);
            // Glowing rim
            const rimGeo = new THREE.TorusGeometry(3.5, 0.2, 8, 32);
            rimGeo.rotateY(Math.PI / 2);
            const rim = new THREE.Mesh(rimGeo, eyeCyanMat);
            w.add(rim);
            robotGroup.add(w);
            return w;
        };

        const w1 = createWheel(8.5, 7);
        const w2 = createWheel(-8.5, 7);
        const w3 = createWheel(8.5, -7);
        const w4 = createWheel(-8.5, -7);

        // Robot Head (Turret)
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 9.5, 5); 
        robotGroup.add(headGroup);

        const headBaseGeo = new THREE.CylinderGeometry(4, 5, 4, 32);
        const headBaseMesh = new THREE.Mesh(headBaseGeo, bodyMat);
        headGroup.add(headBaseMesh);

        // Ultrasonic "Eyes"
        const eyeGeo = new THREE.CylinderGeometry(1.2, 1.2, 1, 16);
        eyeGeo.rotateX(Math.PI / 2);
        const eye1 = new THREE.Mesh(eyeGeo, eyeCyanMat);
        eye1.position.set(-2, 0, 4);
        headGroup.add(eye1);
        const eye2 = new THREE.Mesh(eyeGeo, eyeCyanMat);
        eye2.position.set(2, 0, 4);
        headGroup.add(eye2);

        // Grid Helper for context
        const gridHelper = new THREE.GridHelper(100, 20, 0x00f3ff, 0x00f3ff);
        gridHelper.material.opacity = 0.1;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Animation Loop Variables
        let targetHeadAngle = 90;
        let currentDriveDir = 'stop';
        let frameCount = 0;

        function animate() {
            requestAnimationFrame(animate);
            frameCount++;

            controls.update();

            // 1. Idle Bobbing (Mathematical Breath)
            const bob = Math.sin(frameCount * 0.05) * 0.3;
            bodyMesh.position.y = 5 + bob;
            topPlate.position.y = 8.5 + bob;
            headGroup.position.y = 9.5 + bob;

            // 2. Eye Pulse
            const pulse = 0.6 + Math.sin(frameCount * 0.1) * 0.4;
            if(eye1.material === eyeCyanMat) eyeCyanMat.emissiveIntensity = pulse;

            // 3. Head Rotation Interpolation
            if (targetHeadAngle !== null) {
                const targetRad = (targetHeadAngle - 90) * (Math.PI / 180);
                headGroup.rotation.y += (targetRad - headGroup.rotation.y) * 0.1;
            }

            // 4. Wheel animation based on direction
            const wheelSpeed = 0.2;
            if (currentDriveDir === 'forward') {
                w1.rotation.x += wheelSpeed; w2.rotation.x += wheelSpeed;
                w3.rotation.x += wheelSpeed; w4.rotation.x += wheelSpeed;
            } else if (currentDriveDir === 'backward') {
                w1.rotation.x -= wheelSpeed; w2.rotation.x -= wheelSpeed;
                w3.rotation.x -= wheelSpeed; w4.rotation.x -= wheelSpeed;
            } else if (currentDriveDir === 'left') {
                w1.rotation.x -= wheelSpeed; w3.rotation.x -= wheelSpeed;
                w2.rotation.x += wheelSpeed; w4.rotation.x += wheelSpeed;
            } else if (currentDriveDir === 'right') {
                w1.rotation.x += wheelSpeed; w3.rotation.x += wheelSpeed;
                w2.rotation.x -= wheelSpeed; w4.rotation.x -= wheelSpeed;
            }

            renderer.render(scene, camera);
        }
        
        // Ensure rendering starts only after layout is stable
        setTimeout(() => {
            if(container3D.clientWidth > 0) {
                camera.aspect = container3D.clientWidth / container3D.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container3D.clientWidth, container3D.clientHeight);
            }
            animate();
        }, 100);

        // ── Single Consolidated Telemetry Handler ────────────────────────────────────
        socket.on('telemetry_update', (data) => {
            // Update 3D Head Rotation & Drive State
            const angle = Math.round(data.head_angle);
            currentHeadAngle = angle;
            targetHeadAngle = angle;
            if (data.direction) currentDriveDir = data.direction;

            // Update Sonar HUD & 3D Eyes
            const frontDist = data.head_dist;
            const hudSonarVal = document.getElementById('hud-sonar-val');
            
            if (hudSonarVal) {
                hudSonarVal.innerText = frontDist.toFixed(1) + ' CM';
                
                if (frontDist > 0 && frontDist <= 9) {
                    hudSonarVal.style.color = '#ff003c';
                    hudSonarVal.style.textShadow = '0 0 10px #ff003c';
                    eye1.material = eyeRedMat;
                    eye2.material = eyeRedMat;
                } else if (frontDist < 50) {
                    hudSonarVal.style.color = '#ffae00';
                    hudSonarVal.style.textShadow = '0 0 10px #ffae00';
                    eye1.material = eyeCyanMat;
                    eye2.material = eyeCyanMat;
                } else {
                    hudSonarVal.style.color = '#fff';
                    hudSonarVal.style.textShadow = '0 0 10px var(--accent-color)';
                    eye1.material = eyeCyanMat;
                    eye2.material = eyeCyanMat;
                }
            }

            // Update IR HUD Indicators
            if (data.ir) {
                const updateIR = (id, isActive) => {
                    const el = document.getElementById(id);
                    if (el) {
                        if (isActive) {
                            el.style.borderColor = '#ff003c';
                            el.style.boxShadow = '0 0 15px #ff003c';
                            el.style.background = '#ff003c';
                        } else {
                            el.style.borderColor = '#0f0';
                            el.style.boxShadow = '0 0 10px #0f0';
                            el.style.background = 'transparent';
                        }
                    }
                };
                updateIR('hud-ir-left', data.ir.left === 1);
                updateIR('hud-ir-center', data.ir.center === 1);
                updateIR('hud-ir-right', data.ir.right === 1);
            }

            // Update Battery Indicator
            const bPct = document.getElementById('batt-pct');
            const bVolts = document.getElementById('batt-volts');
            const bFill = document.getElementById('batt-bar-fill');
            const bVal = document.getElementById('battery-val');
            
            if (data.battery !== undefined && bPct && bVolts && bFill) {
                const volts = parseFloat(data.battery).toFixed(1);
                bVolts.innerText = volts + 'V';
                if(bVal) bVal.innerText = volts + 'V';

                let pct = Math.max(0, Math.min(100, (volts - 6.5) / (8.4 - 6.5) * 100));
                bPct.innerText = Math.round(pct) + '%';
                bFill.style.width = pct + '%';

                if (pct > 50) {
                    bFill.style.background = 'linear-gradient(90deg, rgba(0, 243, 255, 0.2), rgba(0, 243, 255, 0.8))';
                    bFill.style.boxShadow = '0 0 15px rgba(0, 243, 255, 0.3)';
                    if(bVal) bVal.style.color = 'var(--accent-color)';
                } else if (pct > 20) {
                    bFill.style.background = 'linear-gradient(90deg, rgba(255, 165, 0, 0.2), rgba(255, 165, 0, 0.8))';
                    bFill.style.boxShadow = '0 0 15px rgba(255, 165, 0, 0.3)';
                    if(bVal) bVal.style.color = '#ffae00';
                } else {
                    bFill.style.background = 'linear-gradient(90deg, rgba(255, 0, 60, 0.2), rgba(255, 0, 60, 0.8))';
                    bFill.style.boxShadow = '0 0 15px rgba(255, 0, 60, 0.3)';
                    if(bVal) bVal.style.color = '#ff003c';
                }
            }

            // Fall Safety Status
            const fallStatus = document.getElementById('fall-status');
            if (fallStatus) {
                if (data.fall) {
                    fallStatus.innerText = 'FALL DETECTED';
                    fallStatus.style.color = '#ff003c';
                    fallStatus.style.border = '1px solid #ff003c';
                    fallStatus.style.background = 'rgba(255, 0, 60, 0.1)';
                    fallStatus.style.boxShadow = 'inset 0 0 10px rgba(255,0,60,0.2)';
                    if (typeof showFallAlert === 'function') showFallAlert();
                } else {
                    fallStatus.innerText = 'FLOOR: SAFE';
                    fallStatus.style.color = 'var(--accent-color)';
                    fallStatus.style.border = '1px solid rgba(0, 243, 255, 0.3)';
                    fallStatus.style.background = 'rgba(0, 243, 255, 0.05)';
                    fallStatus.style.boxShadow = 'inset 0 0 10px rgba(0, 243, 255, 0.05)';
                    fallStatus.style.textShadow = '0 0 5px rgba(0, 243, 255, 0.3)';
                }
            }
        });

    </script>
</body>

</html>
